<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Subtitle Overlay</title>
    <style>
      :root {
        color-scheme: dark;
        --origin-color: #f8fbff;
        --translated-color: #ffd86b;
        --muted-color: rgba(255, 255, 255, 0.72);
        --panel-bg: rgba(7, 12, 20, 0.58);
        --panel-border: rgba(255, 255, 255, 0.14);
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Yu Gothic UI",
          "Noto Sans SC", "Noto Sans JP", sans-serif;
        pointer-events: none;
      }

      #stage {
        width: min(94vw, 1480px);
        padding: 20px 22px 46px;
        display: grid;
        gap: 14px;
      }

      .entry {
        display: grid;
        gap: 10px;
        padding: 16px 20px 18px;
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0)),
          var(--panel-bg);
        backdrop-filter: blur(18px) saturate(120%);
        box-shadow: var(--shadow);
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .timestamp {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted-color);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .line {
        white-space: pre-wrap;
        text-shadow:
          0 2px 16px rgba(0, 0, 0, 0.86),
          0 0 4px rgba(0, 0, 0, 0.85);
      }

      .line.primary {
        font-size: clamp(30px, 3vw, 52px);
        font-weight: 800;
        line-height: 1.28;
      }

      .line.secondary {
        font-size: clamp(21px, 2.05vw, 34px);
        font-weight: 700;
        line-height: 1.32;
        opacity: 0.92;
      }

      .line.origin {
        color: var(--origin-color);
        font-family: "Yu Gothic UI", "Yu Gothic", "Noto Sans JP", sans-serif;
      }

      .line.translated {
        color: var(--translated-color);
      }

      #status,
      #updatedAt {
        position: fixed;
        top: 18px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(7, 12, 20, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 15px;
        font-weight: 700;
      }

      #status {
        right: 22px;
        color: rgba(255, 255, 255, 0.78);
        opacity: 0;
        transform: translateY(-4px);
        transition: opacity 180ms ease, transform 180ms ease;
      }

      #status.show {
        opacity: 1;
        transform: translateY(0);
      }

      #updatedAt {
        left: 22px;
        color: rgba(255, 255, 255, 0.86);
      }
    </style>
  </head>
  <body>
    <div id="stage" aria-live="polite"></div>
    <div id="updatedAt">等待字幕</div>
    <div id="status">字幕连接中断</div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const pollInterval = Math.max(parseInt(params.get("interval") || "700", 10), 250);
      const displayCount = Math.max(parseInt(params.get("count") || "4", 10), 1);
      const mode = (params.get("mode") || "bilingual").toLowerCase();
      const stage = document.getElementById("stage");
      const statusNode = document.getElementById("status");
      const updatedAtNode = document.getElementById("updatedAt");

      let lastSignature = "";
      let failureCount = 0;

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function formatUpdatedAt(value) {
        if (!value) {
          return "等待字幕";
        }

        const date = new Date(value * 1000);
        if (Number.isNaN(date.getTime())) {
          return "等待字幕";
        }

        return `最近更新 ${date.toLocaleTimeString("zh-CN", { hour12: false })}`;
      }

      function renderLine(text, kind, weight) {
        if (!text) {
          return "";
        }
        return `<div class="line ${kind} ${weight}">${escapeHtml(text)}</div>`;
      }

      function renderEntries(entries) {
        if (!entries.length) {
          stage.innerHTML = "";
          return;
        }

        stage.innerHTML = entries
          .map((entry) => {
            const originText = entry.origin || "";
            const translatedText = entry.translated || "";
            let primaryText = "";
            let primaryKind = "origin";
            let secondaryText = "";
            let secondaryKind = "translated";

            if (mode === "origin") {
              primaryText = originText || translatedText;
              primaryKind = "origin";
            } else if (mode === "translated") {
              primaryText = translatedText || originText;
              primaryKind = translatedText ? "translated" : "origin";
            } else if (translatedText) {
              primaryText = translatedText;
              primaryKind = "translated";
              secondaryText = originText;
              secondaryKind = "origin";
            } else {
              primaryText = originText;
              primaryKind = "origin";
            }

            const timestampNode = entry.timestamp_text
              ? `<div class="meta"><div class="timestamp">${escapeHtml(entry.timestamp_text)}</div></div>`
              : "";

            return `
              <section class="entry">
                ${timestampNode}
                ${renderLine(primaryText, primaryKind, "primary")}
                ${renderLine(secondaryText, secondaryKind, "secondary")}
              </section>
            `;
          })
          .join("");
      }

      function updateStatus(healthy) {
        statusNode.classList.toggle("show", !healthy);
      }

      async function refresh() {
        try {
          const response = await fetch(`/api/subtitle?ts=${Date.now()}`, {
            cache: "no-store",
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const payload = await response.json();
          const entries = Array.isArray(payload.entries)
            ? payload.entries.slice(-displayCount)
            : [];
          const signature = JSON.stringify(entries);
          if (signature !== lastSignature) {
            lastSignature = signature;
            renderEntries(entries);
          }
          updatedAtNode.textContent = formatUpdatedAt(payload.updated_at);

          failureCount = 0;
          updateStatus(true);
        } catch (error) {
          failureCount += 1;
          updatedAtNode.textContent = "等待字幕";
          if (failureCount >= 2) {
            updateStatus(false);
          }
        }
      }

      refresh();
      window.setInterval(refresh, pollInterval);
    </script>
  </body>
</html>
